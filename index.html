<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & B | Skopelos 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/century-gothic');
        body { font-family: 'Century Gothic', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom turquoise color to match the Aegean water */
        .bg-aegean { background-color: #00b4b4; }
        .text-aegean { color: #00b4b4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Manual Lucide Icon implementation for browser compatibility
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('26');
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

            const TabButton = ({ id, label, date }) => (
                <button
                    onClick={() => setActiveTab(id)}
                    className={`flex flex-col items-center px-6 py-4 rounded-xl transition-all duration-300 ${
                        activeTab === id 
                        ? 'bg-stone-800 text-white shadow-lg transform -translate-y-1' 
                        : 'bg-stone-100 text-stone-500 hover:bg-stone-200'
                    }`}
                >
                    <span className="text-[10px] font-mono uppercase tracking-widest mb-1">{label}</span>
                    <span className="text-xl font-bold">{date}</span>
                </button>
            );

            const NavigationMenu = () => (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${
                    scrolled || currentPage !== 'home' 
                    ? 'bg-white/95 backdrop-blur-md py-4 shadow-sm' 
                    : 'bg-aegean py-6'
                }`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <button onClick={() => setCurrentPage('home')} className={`text-2xl tracking-tighter transition-colors ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>
                            S & B
                        </button>
                        <div className={`hidden lg:flex space-x-6 text-[10px] uppercase tracking-widest font-bold ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>
                            <button onClick={() => setCurrentPage('home')} className="hover:opacity-60 transition-opacity">The Wedding</button>
                            <button onClick={() => setCurrentPage('travel')} className="hover:opacity-60 transition-opacity">Travel Guide</button>
                            <button onClick={() => setCurrentPage('guide')} className="hover:opacity-60 transition-opacity">Skopelos Tips</button>
                        </div>
                        <button className={`px-6 py-2 rounded-full text-xs uppercase tracking-widest transition-all font-bold ${scrolled || currentPage !== 'home' ? 'bg-stone-800 text-white hover:bg-stone-700' : 'bg-white text-aegean hover:bg-stone-100'}`}>
                            RSVP
                        </button>
                    </div>
                </nav>
            );

            if (currentPage === 'guide') {
                return (
                    <div className="min-h-screen bg-stone-50 text-stone-800">
                        <NavigationMenu />
                        <header className="pt-32 pb-16 bg-emerald-900 text-white relative overflow-hidden">
                            <div className="absolute inset-0 opacity-20">
                                <img src="https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&q=80&w=1920" className="w-full h-full object-cover" />
                            </div>
                            <div className="container relative z-10 mx-auto px-6 max-w-5xl text-center">
                                <h1 className="text-5xl md:text-6xl font-normal mb-6">Our Skopelos</h1>
                                <p className="text-emerald-100 max-w-2xl mx-auto leading-relaxed italic">"Beyond the wedding, we want you to fall in love with this island as much as we have."</p>
                            </div>
                        </header>
                        <main className="container mx-auto px-6 max-w-5xl py-16 space-y-20">
                            <section>
                                <div className="flex items-center gap-4 mb-10">
                                    <div className="p-3 bg-blue-50 rounded-2xl text-blue-600"><Icon name="waves" /></div>
                                    <h2 className="text-4xl">Favourite Beaches</h2>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="aspect-[4/3] bg-stone-200 rounded-[2rem] flex items-center justify-center text-stone-400 italic border-2 border-dashed border-stone-300">Panormos & Kastani</div>
                                    <div className="aspect-[4/3] bg-stone-100 rounded-[2rem] flex items-center justify-center text-stone-400 italic border-2 border-dashed border-stone-300">Milia & Limnonari</div>
                                </div>
                            </section>
                            <div className="text-center">
                                <button onClick={() => setCurrentPage('home')} className="text-stone-400 hover:text-stone-800 flex items-center gap-2 mx-auto font-bold uppercase tracking-widest text-xs">
                                    <Icon name="chevron-left" size={16} /> Back to Home
                                </button>
                            </div>
                        </main>
                    </div>
                );
            }

            if (currentPage === 'travel') {
                return (
                    <div className="min-h-screen bg-stone-50 text-stone-800">
                        <NavigationMenu />
                        <header className="pt-32 pb-16 bg-stone-800 text-white text-center px-6">
                            <h1 className="text-5xl md:text-6xl mb-6">Reaching The Island</h1>
                            <p className="text-stone-400 italic">"A hidden gem without its own airport—part of its charm."</p>
                        </header>
                        <main className="container mx-auto px-6 max-w-5xl py-16 space-y-12">
                            <section className="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-stone-100">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="p-3 bg-stone-100 rounded-2xl"><Icon name="plane" /></div>
                                    <h2 className="text-3xl">Flying to the Sporades</h2>
                                </div>
                                <p className="text-stone-600 leading-relaxed">Fly to <strong>Skiathos (JSI)</strong>. From there, it's a short ferry ride to Skopelos Glossa (Loutraki).</p>
                            </section>
                            <div className="text-center">
                                <button onClick={() => setCurrentPage('home')} className="text-stone-400 hover:text-stone-800 flex items-center gap-2 mx-auto font-bold uppercase tracking-widest text-xs">
                                    <Icon name="chevron-left" size={16} /> Back to Home
                                </button>
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className="fade-in">
                    <NavigationMenu />
                    <header className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-black/30 z-10"></div>
                            {/* Zoomed out to 100% to prevent pixelation while maintaining cover */}
                            <img 
                                src="Cape-Amarandos-Skopelos-Greece.jpg" 
                                className="w-full h-full object-cover transition-transform duration-1000" 
                                alt="Cape Amarandos"
                                onError={(e) => {
                                    e.target.src = "https://skopelos.com/wp-content/uploads/2019/08/amarandos-skopelos-9.jpg";
                                    e.target.onerror = null;
                                }}
                            />
                        </div>
                        <div className="relative z-20 text-center text-white px-6 mt-16">
                            <p className="text-xs uppercase tracking-[0.4em] mb-6 font-bold">Skopelos, Greece</p>
                            <h1 className="text-6xl md:text-9xl mb-8 leading-none">Samantha <br/> <span className="italic opacity-80 text-4xl md:text-7xl">&</span> <br/> Barnaby</h1>
                            <div className="w-16 h-px bg-white/50 mx-auto mb-8"></div>
                            <p className="text-xl md:text-2xl italic">26 . 05 . 2026</p>
                        </div>
                    </header>

                    <section className="py-24 px-6 container mx-auto max-w-5xl">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-5xl mb-4">The Celebration</h2>
                            <p className="text-stone-500 italic">Three days on the emerald island</p>
                        </div>
                        <div className="flex justify-center space-x-4 mb-12">
                            <TabButton id="25" label="Monday" date="May 25" />
                            <TabButton id="26" label="Tuesday" date="May 26" />
                            <TabButton id="27" label="Wednesday" date="May 27" />
                        </div>
                        <div className="bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-stone-100 min-h-[300px]">
                            {activeTab === '26' ? (
                                <div>
                                    <h3 className="text-3xl mb-6">The Big Day</h3>
                                    <div className="space-y-6">
                                        <p><strong>12:00 PM:</strong> Arrival & Welcome Drinks</p>
                                        <p><strong>01:00 PM:</strong> The Ceremony</p>
                                        <p><strong>03:00 PM:</strong> Wedding Breakfast</p>
                                        <p><strong>06:15 PM:</strong> Party Commences</p>
                                    </div>
                                </div>
                            ) : (
                                <p className="text-stone-400 italic">Details coming soon for this day!</p>
                            )}
                        </div>
                    </section>

                    <section className="py-24 bg-stone-800 text-stone-100">
                        <div className="container mx-auto px-6 max-w-5xl">
                            <h2 className="text-4xl mb-8 text-white">Mediterranean Summer Glamour</h2>
                            <p className="text-stone-400 mb-8 max-w-xl">We want the day to feel light, airy, and elegant. Think sun-drenched pastels and breathable fabrics like linen.</p>
                            <div className="grid md:grid-cols-2 gap-8 text-sm">
                                <div>
                                    <h4 className="font-bold uppercase mb-2 tracking-widest text-white">For Gentlemen</h4>
                                    <p>Linen or cotton suits in light tones. Ties optional.</p>
                                </div>
                                <div>
                                    <h4 className="font-bold uppercase mb-2 tracking-widest text-white">For Ladies</h4>
                                    <p>Breezy midi or maxi dresses in soft florals. Wedges recommended.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-50 border-t border-stone-200 text-center">
                        <p className="text-2xl mb-4">S & B</p>
                        <p className="text-[10px] uppercase tracking-widest text-stone-400 font-bold mb-2">Skopelos 2026</p>
                        <p className="text-[9px] text-stone-300 font-mono tracking-tighter italic">Last updated: March 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
