<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & B | Skopelos 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/century-gothic');
        body { font-family: 'Century Gothic', sans-serif; background-color: #fcfbf9; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bg-aegean { background-color: #00b4b4; }
        .text-aegean { color: #00b4b4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-link { position: relative; cursor: pointer; }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: currentColor;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const EMAILJS_PUBLIC_KEY = "x68dU85ltXbBTJyQT"; 
        const EMAILJS_SERVICE_ID = "sammy.and.barney.85";
        const EMAILJS_TEMPLATE_ID = "template_a5h60pd";

        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Footer = () => (
            <footer className="py-16 bg-[#00b4b4] text-white text-center">
                <p className="text-2xl tracking-[0.3em] font-normal mb-3 uppercase">S & B</p>
                <p className="text-[10px] uppercase tracking-[0.4em] font-bold opacity-70">Updated March 2026</p>
            </footer>
        );

        const RSVPModal = ({ isOpen, onClose }) => {
            const [status, setStatus] = useState('idle'); 
            const [formData, setFormData] = useState({
                mainContact: '',
                allGuests: '',
                attending: '',
                dietary: '',
                song: ''
            });
            
            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('sending');
                
                const templateParams = {
                    from_name: formData.mainContact,
                    guest_list: formData.allGuests,
                    attendance: formData.attending === 'yes' ? 'Happily Attending' : 'Regretfully Declining',
                    dietary: formData.dietary || 'None specified',
                    song_request: formData.song || 'None provided'
                };

                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                    setStatus('success');
                } catch (error) {
                    console.error('EmailJS Error:', error);
                    setStatus('error');
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-md">
                    <div className="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden shadow-2xl fade-in max-h-[90vh] flex flex-col">
                        <div className="p-8 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                            <div>
                                <h2 className="text-2xl font-normal text-stone-800">RSVP</h2>
                                <p className="text-[10px] uppercase tracking-widest text-stone-400 mt-1 font-bold italic">Kindly respond by 31st March 2026</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-stone-200 rounded-full transition-colors">
                                <Icon name="x" size={20} className="text-stone-400" />
                            </button>
                        </div>
                        <div className="p-8 overflow-y-auto no-scrollbar">
                            {status === 'success' ? (
                                <div className="text-center py-12 space-y-6">
                                    <div className="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto">
                                        <Icon name="check" size={40} />
                                    </div>
                                    <h3 className="text-2xl mb-2 font-normal">Thank You!</h3>
                                    <p className="text-stone-500 text-sm">We've received your response and song choice.</p>
                                    <button onClick={onClose} className="mt-4 bg-stone-800 text-white px-8 py-3 rounded-full text-xs uppercase tracking-widest font-bold">Close</button>
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="space-y-5">
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Main Contact Name</label>
                                            <input required type="text" placeholder="Your full name" value={formData.mainContact} onChange={(e) => setFormData({...formData, mainContact: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-aegean outline-none transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Guests Included</label>
                                            <textarea required rows="2" placeholder="Names of everyone in your party" value={formData.allGuests} onChange={(e) => setFormData({...formData, allGuests: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-aegean outline-none transition-colors text-sm"></textarea>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Attendance</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button type="button" onClick={() => setFormData({...formData, attending: 'yes'})} className={`p-4 border rounded-xl text-sm transition-all ${formData.attending === 'yes' ? 'border-aegean bg-aegean/5 text-aegean font-bold' : 'border-stone-200 hover:bg-stone-50'}`}>Happily Attend</button>
                                                <button type="button" onClick={() => setFormData({...formData, attending: 'no'})} className={`p-4 border rounded-xl text-sm transition-all ${formData.attending === 'no' ? 'border-stone-800 bg-stone-50 font-bold' : 'border-stone-200 hover:bg-stone-50'}`}>Regretfully Decline</button>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Dietary Requirements</label>
                                            <textarea rows="2" placeholder="Allergies or specific needs" value={formData.dietary} onChange={(e) => setFormData({...formData, dietary: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-aegean outline-none transition-colors text-sm"></textarea>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Dancefloor Filler</label>
                                            <input type="text" placeholder="What song will get you dancing?" value={formData.song} onChange={(e) => setFormData({...formData, song: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-aegean outline-none transition-colors text-sm" />
                                        </div>
                                    </div>
                                    <button type="submit" disabled={status === 'sending'} className="w-full bg-aegean text-white py-4 rounded-full text-xs uppercase tracking-widest font-bold shadow-lg shadow-aegean/20 disabled:opacity-50 transition-all hover:scale-[1.02] active:scale-[0.98]">
                                        {status === 'sending' ? 'Sending...' : 'Submit RSVP'}
                                    </button>
                                    {status === 'error' && <p className="text-red-500 text-[10px] text-center uppercase tracking-widest font-bold mt-2">Error sending. Please try again.</p>}
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

         // --- PAGE COMPONENTS ---

        const TravelPage = () => (
            <div className="fade-in min-h-screen bg-stone-50">
                <header className="pt-32 pb-16 bg-stone-800 text-white text-center px-6">
                    <h1 className="text-5xl md:text-6xl mb-6 font-normal">Travel Guide</h1>
                    <p className="max-w-2xl mx-auto opacity-70 italic leading-relaxed">Everything you need to know about getting to and around the beautiful island of Skopelos.</p>
                </header>
                <main className="container mx-auto px-6 max-w-4xl py-16 space-y-16">
                    
                    <section className="space-y-8">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-white rounded-2xl text-aegean shadow-sm"><Icon name="plane" /></div>
                            <h2 className="text-3xl font-normal">Flying</h2>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-stone-100 space-y-6 text-stone-600 leading-relaxed">
                            <p>The easiest way to get to the island is to fly to <strong>Skiathos (around 3-4 hours from the UK)</strong>.</p>
                            
                            <p>It may be helpful to know that <strong>Aegean Airlines</strong> operate a 45min flight to Skiathos from Athens, if you are interested in taking in some Athenian culture along the way.</p>
                            <p>When you land in Skiathos, you will probably be taken from the plane to the terminal on the shortest bus trip you have ever been on. The good news is that the terminal is small and any checked luggage will be with you in 5 minutes and you are free to head out.</p>
                        </div>
                    </section>

                    <section className="space-y-8">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-white rounded-2xl text-aegean shadow-sm"><Icon name="anchor" /></div>
                            <h2 className="text-3xl font-normal">To The Port</h2>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-stone-100 space-y-6 text-stone-600 leading-relaxed">
                            <p>The airport is a very short drive from the main town and port on Skiathos. The main towns of the islands share the name of the islands just to be confusing when you're travelling and most flustered.</p>
                            <p>You can walk the journey in about 40mins, but there is a taxi rank right outside the airport exit and a taxi ride is around <strong>€10 for the 10 minute journey</strong> to the port.</p>
                        </div>
                    </section>

                    <section className="space-y-8">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-white rounded-2xl text-aegean shadow-sm"><Icon name="ship" /></div>
                            <h2 className="text-3xl font-normal">Island Hopping</h2>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-stone-100 space-y-6 text-stone-600 leading-relaxed">
                            <p>From the main Skiathos port, you can take a variety of boats over to Skopelos. We recommend booking your ferry tickets in advance via <a href="https://go-ferry.com" target="_blank" className="text-aegean underline hover:opacity-80 transition-opacity">go-ferry.com</a>.</p>
                            
                            <div className="space-y-4 pt-4 border-t border-stone-100">
                                <h4 className="text-stone-800 font-bold uppercase text-[10px] tracking-widest">Option 1: Loutraki (Glossa Port) — Recommended</h4>
                                <p>On Skopelos, the first stop and most convenient if you are staying at the <strong>Natura Luxury Hotel</strong> is Loutraki, the port of the second town on the island, Glossa. The ticket will be to Glossa and the journey takes about <strong>half an hour by ferry or 15 mins on the hydrofoils</strong>.</p>
                            </div>

                            <div className="space-y-4 pt-4 border-t border-stone-100">
                                <h4 className="text-stone-800 font-bold uppercase text-[10px] tracking-widest">Option 2: Skopelos Town (Chora)</h4>
                                <p>The second stop is normally Skopelos, the main town on the island of Skopelos, but also called <strong>“Chora”</strong>. This is roughly an hour away and most suitable for any guests who have found a place to stay near Skopelos Town.</p>
                            </div>
                        </div>
                    </section>

                    <section className="space-y-8">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-white rounded-2xl text-aegean shadow-sm"><Icon name="clock" /></div>
                            <h2 className="text-3xl font-normal">Time on Skiathos</h2>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-stone-100 space-y-6 text-stone-600 leading-relaxed">
                            <p>If you have some time to kill before your boat, we recommend heading to <a href="https://www.bourtzi-skiathos.gr/" target="_blank" className="text-aegean underline hover:opacity-80 transition-opacity">The Bourtzi</a>. It is a beautiful spot for a drink or light snack while you wait for your departure.</p>
                        </div>
                    </section>

                    <section className="space-y-8">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-white rounded-2xl text-aegean shadow-sm"><Icon name="car" /></div>
                            <h2 className="text-3xl font-normal">Getting Around Skopelos</h2>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-stone-100 space-y-6 text-stone-600 leading-relaxed">
                            <p>Once on the island, the best way to explore is by car. For car rentals, you can contact <strong>Dream Cars</strong> at <a href="mailto:dreamcar@otenet.gr" className="text-aegean underline hover:opacity-80 transition-opacity">dreamcar@otenet.gr</a>.</p>
                        </div>
                    </section>
                </main>
                <Footer />
            </div>
        );

        const TipsPage = () => (
            <div className="fade-in min-h-screen bg-[#fcfbf9]">
                <header className="pt-40 pb-20 bg-aegean text-white text-center px-6">
                    <h1 className="text-5xl md:text-7xl mb-6 font-normal">Island Life</h1>
                    <p className="max-w-xl mx-auto opacity-90 italic text-lg">Tips for a perfect Greek escape</p>
                </header>
                <main className="container mx-auto px-6 max-w-5xl py-20">
                    <div className="grid md:grid-cols-2 gap-10">
                        {[
                            { title: "Cash & Cards", icon: "credit-card", text: "Cards are widely used, but keep some Euros for taxis, small tavernas, and beach kiosks." },
                            { title: "Water", icon: "droplets", text: "Tap water is fine for brushing teeth, but we recommend bottled water for drinking." },
                            { title: "Mamma Mia!", icon: "music", text: "Agios Ioannis Church is about 45 mins from town. Go early to beat the heat and the crowds!" },
                            { title: "Dining", icon: "utensils", text: "Dinner starts late in Greece (9pm onwards). Don't miss the local Skopelos cheese pie!" }
                        ].map((tip, i) => (
                            <div key={i} className="bg-white p-12 rounded-[3rem] shadow-sm border border-stone-100">
                                <div className="w-14 h-14 bg-stone-50 rounded-2xl flex items-center justify-center mb-8 text-aegean">
                                    <Icon name={tip.icon} size={28} />
                                </div>
                                <h3 className="text-2xl mb-4 font-normal text-stone-800">{tip.title}</h3>
                                <p className="text-stone-500 leading-relaxed">{tip.text}</p>
                            </div>
                        ))}
                    </div>
                </main>
                <Footer />
            </div>
        );

        const HomePage = ({ setActiveTab, activeTab }) => {
            const schedule = {
                '25': [
                    { t: "Evening", e: "Drinks & Nibbles", d: "Skopelos Town Port (Waterfront Taverna). A casual meet-up by the harbor to kick off the celebrations. We'd love for everyone to mingle over local wine and light bites as the sun sets over the Aegean. Time TBC." }
                ],
                '26': [
                    { t: "11:30", e: "Transport", d: "A coach will take guests from Natura Luxury Hotel to the venue\nGolf buggies will take guests staying Natura Villas to the venue" },
                    { t: "12:00", e: "Welcome Drinks", d: "Refreshing Greek spritz on the terrace" },
                    { t: "13:00", e: "Ceremony", d: "Under the pine trees overlooking the Aegean" },
                    { t: "15:00", e: "Wedding Breakfast", d: "A feast of local Skopelos delicacies" },
                    { t: "18:15", e: "The Party", d: "Dancing until the early hours" },
                    { t: "00:00", e: "Transport", d: "A coach will take guests back to Natura Luxury Hotel\nGolf buggies will return guests to Natura Villas" }
                ],
                '27': [
                    { t: "13:00", e: "Recovery Beach Day", d: "Beach Club (Venue TBC). An informal gathering to nurse the dancing feet and share stories from the night before. Optional downtime for sun, sea, and total relaxation." }
                ]
            };

            return (
                <div className="fade-in">
                    <header className="relative h-screen flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-black/40 z-10"></div>
                            <img src="https://images.unsplash.com/photo-1516483642775-9a5cf2df7fb1?auto=format&fit=crop&q=80&w=2000" className="w-full h-full object-cover scale-105" alt="Skopelos" />
                        </div>
                        <div className="relative z-20 text-center text-white px-6">
                            <p className="text-[10px] uppercase tracking-[0.5em] mb-8 font-bold opacity-90">Skopelos, Greece</p>
                            <h1 className="text-6xl md:text-[8rem] mb-10 leading-[0.9] font-normal">Samantha <br/> <span className="italic opacity-60 text-4xl md:text-7xl">&</span> <br/> Barnaby</h1>
                            <p className="text-xl md:text-2xl tracking-[0.3em] font-light">26 . 05 . 2026</p>
                        </div>
                        <div className="absolute bottom-12 z-20 animate-bounce opacity-50">
                            <Icon name="chevron-down" className="text-white" />
                        </div>
                    </header>

                    <section className="py-32 px-6 container mx-auto max-w-5xl">
                        <div className="text-center mb-20">
                            <h2 className="text-4xl md:text-6xl mb-6 font-normal">The Celebration</h2>
                            <p className="text-stone-400 italic text-lg tracking-wide uppercase text-xs font-bold">May 25th — May 27th</p>
                        </div>
                        
                        <div className="flex justify-center space-x-6 mb-16">
                            {['25', '26', '27'].map(d => (
                                <button key={d} onClick={() => setActiveTab(d)} className={`flex flex-col items-center px-10 py-6 rounded-3xl transition-all duration-300 ${activeTab === d ? 'bg-stone-800 text-white shadow-2xl scale-110' : 'bg-white text-stone-300 border border-stone-100 hover:text-stone-500'}`}>
                                    <span className="text-[10px] uppercase tracking-widest mb-2 font-bold">{d === '25' ? 'Mon' : d === '26' ? 'Tue' : 'Wed'}</span>
                                    <span className="text-2xl font-bold">{d}</span>
                                </button>
                            ))}
                        </div>

                        <div className="bg-white rounded-[3.5rem] p-10 md:p-20 shadow-sm border border-stone-100 min-h-[400px]">
                            <div className="fade-in space-y-16">
                                <div className="text-center max-w-xl mx-auto border-b border-stone-100 pb-12">
                                    <h3 className="text-4xl mb-3 font-normal">
                                        {activeTab === '25' ? 'The Welcome' : activeTab === '26' ? 'The Big Day' : 'The Wind Down'}
                                    </h3>
                                    <p className="text-aegean font-bold text-[10px] uppercase tracking-[0.3em]">
                                        {activeTab === '25' ? 'Monday 25th May 2026' : activeTab === '26' ? 'Tuesday 26th May 2026' : 'Wednesday 27th May 2026'}
                                    </p>
                                </div>
                                <div className="grid gap-12 max-w-2xl mx-auto">
                                    {schedule[activeTab].map((item, i) => (
                                        <div key={i} className="flex gap-10 group">
                                            <span className="font-bold text-stone-200 w-16 text-sm pt-1 tracking-tighter uppercase">{item.t}</span>
                                            <div className="pb-4 border-l-2 border-stone-50 pl-10 relative">
                                                <div className="absolute -left-[9px] top-2 w-4 h-4 rounded-full bg-white border-2 border-stone-100 group-hover:border-aegean transition-colors"></div>
                                                <p className="font-bold text-2xl mb-2 text-stone-800">{item.e}</p>
                                                <p className="text-stone-400 leading-relaxed whitespace-pre-line">{item.d}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Dress Code Section */}
                        <div className="mt-20 bg-white rounded-[3.5rem] p-12 md:p-20 shadow-sm border border-stone-100 text-center">
                            <div className="max-w-3xl mx-auto">
                                <p className="text-[10px] uppercase tracking-[0.3em] font-bold text-stone-400 mb-4">The Dress Code</p>
                                <h2 className="text-4xl md:text-5xl font-normal text-stone-800 mb-8 italic">“Aegean Summer”</h2>
                                <p className="text-stone-500 leading-relaxed text-lg mb-16">
                                    We would love for the day to feel light, airy, and effortlessly elegant mirroring the vibrant spirit of a Greek summer. We invite you to embrace a palette of sun-drenched pastels, bold Mediterranean solids, and flowing, sophisticated fabrics.
                                </p>
                                
                                <div className="grid md:grid-cols-2 gap-16 text-left">
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-stone-50 rounded-xl flex items-center justify-center text-aegean">
                                                <Icon name="user" size={20} />
                                            </div>
                                            <h3 className="text-xl font-normal tracking-wide">For Gentlemen</h3>
                                        </div>
                                        <div className="space-y-4 pt-4 border-t border-stone-100">
                                            <div>
                                                <h4 className="text-[10px] uppercase tracking-widest font-bold text-aegean mb-1">Summer Tailoring</h4>
                                                <p className="text-stone-800 font-bold mb-1">THE LOOK</p>
                                                <p className="text-stone-500 text-sm leading-relaxed">Fitted linen or cotton suits in light, breathable tones (think sand, stone, sage, or pale blue).</p>
                                            </div>
                                            <div>
                                                <p className="text-stone-800 font-bold mb-1">THE DETAIL</p>
                                                <p className="text-stone-500 text-sm leading-relaxed">While ties are optional, we encourage a sharp, tailored finish. A crisp shirt and pocket square will perfectly complement the setting.</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-stone-50 rounded-xl flex items-center justify-center text-aegean">
                                                <Icon name="sparkles" size={20} />
                                            </div>
                                            <h3 className="text-xl font-normal tracking-wide">For Ladies</h3>
                                        </div>
                                        <div className="space-y-4 pt-4 border-t border-stone-100">
                                            <div>
                                                <h4 className="text-[10px] uppercase tracking-widest font-bold text-aegean mb-1">Architectural Silhouettes</h4>
                                                <p className="text-stone-800 font-bold mb-1">THE LOOK</p>
                                                <p className="text-stone-500 text-sm leading-relaxed">Soft, tonal shades or vibrant colours. Think of dresses with beautiful draping, clean lines, or a subtle shimmer.</p>
                                            </div>
                                            <div>
                                                <p className="text-stone-800 font-bold mb-1">THE DETAIL</p>
                                                <p className="text-stone-500 text-sm leading-relaxed">Long or midi length dresses. Elegant fabrics that catch the island breeze. As we are on the coast, we suggest a slightly thicker heel over stilettos.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Family Fun & Safety Section */}
                        <div className="mt-20 bg-stone-900 text-white rounded-[3.5rem] p-12 md:p-20 shadow-xl overflow-hidden relative">
                             <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none">
                                <Icon name="heart" size={120} />
                            </div>
                            <div className="relative z-10">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="p-3 bg-aegean rounded-2xl"><Icon name="smile" size={24} /></div>
                                    <h2 className="text-3xl md:text-5xl font-normal">Family Fun & Safety</h2>
                                </div>
                                <div className="grid md:grid-cols-1 gap-10 max-w-3xl">
                                    <p className="text-lg opacity-80 leading-relaxed">
                                        We have organised the event to ensure our younger guests have as much fun as us adults. There will be a dedicated area for games, play, dancing, an outdoor cinema screening and a cosy space for napping. The safety and comfort of your little ones is also incredibly important to us.
                                    </p>
                                    <div className="grid md:grid-cols-2 gap-8 pt-6 border-t border-white/10">
                                        <div className="space-y-4">
                                            <h4 className="text-aegean font-bold uppercase text-[10px] tracking-[0.2em]">Nannies</h4>
                                            <p className="text-sm opacity-70 leading-relaxed">
                                                We have arranged for professional childcare to be on-site to supervise activities and manage a quiet "Sleepy Station" in the evening - please note you will still need to be responsible for your children, but we hope this helps you enjoy the party that bit more.
                                            </p>
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="text-aegean font-bold uppercase text-[10px] tracking-[0.2em]">Lifeguard</h4>
                                            <p className="text-sm opacity-70 leading-relaxed">
                                                There will be no swimming allowed during the wedding and certified lifeguards will be on duty throughout to ensure everyone stays safe.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <Footer />
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('26');
            const [scrolled, setScrolled] = useState(false);
            const [isRSVPOpen, setIsRSVPOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 80);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="bg-[#fcfbf9]">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled || currentPage !== 'home' ? 'bg-white/90 backdrop-blur-xl py-4 shadow-sm' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <button onClick={() => {setCurrentPage('home'); window.scrollTo(0,0);}} className={`text-2xl tracking-tighter transition-colors ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>S & B</button>
                            <div className={`hidden lg:flex space-x-12 text-[10px] uppercase tracking-[0.3em] font-bold ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>
                                <button onClick={() => {setCurrentPage('home'); window.scrollTo(0,0);}} className="nav-link">The Wedding</button>
                                <button onClick={() => {setCurrentPage('travel'); window.scrollTo(0,0);}} className="nav-link">Travel</button>
                                <button onClick={() => {setCurrentPage('tips'); window.scrollTo(0,0);}} className="nav-link">Island Info</button>
                            </div>
                            <button onClick={() => setIsRSVPOpen(true)} className={`px-8 py-3 rounded-full text-[10px] uppercase tracking-widest transition-all font-bold ${scrolled || currentPage !== 'home' ? 'bg-stone-800 text-white' : 'bg-white text-aegean shadow-xl hover:scale-105'}`}>RSVP</button>
                        </div>
                    </nav>

                    <RSVPModal isOpen={isRSVPOpen} onClose={() => setIsRSVPOpen(false)} />

                    {currentPage === 'home' && <HomePage setActiveTab={setActiveTab} activeTab={activeTab} />}
                    {currentPage === 'travel' && <TravelPage />}
                    {currentPage === 'tips' && <TipsPage />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
