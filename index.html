<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & B | Skopelos 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/century-gothic');
        body { font-family: 'Century Gothic', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bg-aegean { background-color: #00b4b4; } /* Soft Turquoise */
        .text-aegean { color: #00b4b4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions for navigation */
        .nav-link { position: relative; }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: currentColor;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const EMAILJS_PUBLIC_KEY = "x68dU85ltXbBTJyQT"; 
        const EMAILJS_SERVICE_ID = "sammy.and.barney.85";
        const EMAILJS_TEMPLATE_ID = "template_a5h60pd";

        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Footer = () => (
            <footer className="py-12 bg-[#00b4b4] text-white text-center">
                <p className="text-xl tracking-[0.2em] font-normal mb-2 uppercase">S & B</p>
                <p className="text-[10px] uppercase tracking-[0.4em] font-bold opacity-80">March 2026</p>
            </footer>
        );

        const RSVPModal = ({ isOpen, onClose }) => {
            const [status, setStatus] = useState('idle'); 
            const [formData, setFormData] = useState({
                names: '',
                attending: '',
                dietary: '',
                song: ''
            });
            
            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('sending');
                const templateParams = {
                    from_name: formData.names,
                    attendance: formData.attending === 'yes' ? 'Happily Attending' : 'Regretfully Declining',
                    dietary: formData.dietary || 'None specified',
                    song_request: formData.song || 'No request'
                };
                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                    setStatus('success');
                } catch (error) {
                    setStatus('error');
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden shadow-2xl fade-in max-h-[90vh] flex flex-col">
                        <div className="p-8 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                            <div>
                                <h2 className="text-2xl font-normal text-stone-800">RSVP</h2>
                                <p className="text-[10px] uppercase tracking-widest text-stone-400 mt-1 font-bold italic">Kindly respond by 31st March 2026</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-stone-200 rounded-full transition-colors">
                                <Icon name="x" size={20} className="text-stone-400" />
                            </button>
                        </div>
                        <div className="p-8 overflow-y-auto no-scrollbar">
                            {status === 'success' ? (
                                <div className="text-center py-12 space-y-6">
                                    <div className="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto">
                                        <Icon name="check" size={40} />
                                    </div>
                                    <h3 className="text-2xl mb-2">Thank You!</h3>
                                    <button onClick={onClose} className="bg-stone-800 text-white px-8 py-3 rounded-full text-xs uppercase tracking-widest font-bold">Back to site</button>
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Full Names</label>
                                            <input required type="text" value={formData.names} onChange={(e) => setFormData({...formData, names: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-aegean outline-none transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Attendance</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button type="button" onClick={() => setFormData({...formData, attending: 'yes'})} className={`p-4 border rounded-xl text-sm transition-colors ${formData.attending === 'yes' ? 'border-aegean bg-aegean/5 text-aegean' : 'border-stone-200 hover:bg-stone-50'}`}>Happily Attend</button>
                                                <button type="button" onClick={() => setFormData({...formData, attending: 'no'})} className={`p-4 border rounded-xl text-sm transition-colors ${formData.attending === 'no' ? 'border-stone-800 bg-stone-50' : 'border-stone-200 hover:bg-stone-50'}`}>Regretfully Decline</button>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Dietary Requirements</label>
                                            <textarea rows="2" value={formData.dietary} onChange={(e) => setFormData({...formData, dietary: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-aegean outline-none transition-colors text-sm"></textarea>
                                        </div>
                                    </div>
                                    <button type="submit" disabled={status === 'sending'} className="w-full bg-aegean text-white py-4 rounded-full text-xs uppercase tracking-widest font-bold shadow-lg shadow-aegean/20 disabled:opacity-50 transition-all">
                                        {status === 'sending' ? 'Sending...' : 'Send Response'}
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('26');
            const [scrolled, setScrolled] = useState(false);
            const [isRSVPOpen, setIsRSVPOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const NavigationMenu = () => (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled || currentPage !== 'home' ? 'bg-white/95 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <button onClick={() => setCurrentPage('home')} className={`text-2xl tracking-tighter transition-colors ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>S & B</button>
                        <div className={`hidden lg:flex space-x-8 text-[10px] uppercase tracking-widest font-bold ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>
                            <button onClick={() => setCurrentPage('home')} className="nav-link">The Wedding</button>
                            <button onClick={() => setCurrentPage('travel')} className="nav-link">Travel Guide</button>
                            <button onClick={() => setCurrentPage('tips')} className="nav-link">Skopelos Tips</button>
                        </div>
                        <button onClick={() => setIsRSVPOpen(true)} className={`px-6 py-2 rounded-full text-xs uppercase tracking-widest transition-all font-bold ${scrolled || currentPage !== 'home' ? 'bg-stone-800 text-white' : 'bg-white text-aegean'}`}>RSVP</button>
                    </div>
                </nav>
            );

            // Travel Page
            if (currentPage === 'travel') {
                return (
                    <div className="min-h-screen bg-stone-50 text-stone-800">
                        <NavigationMenu />
                        <RSVPModal isOpen={isRSVPOpen} onClose={() => setIsRSVPOpen(false)} />
                        <header className="pt-32 pb-16 bg-stone-800 text-white text-center px-6">
                            <h1 className="text-5xl md:text-6xl mb-6">Travel Guide</h1>
                            <p className="max-w-xl mx-auto opacity-70 italic">Getting to the island of Mamma Mia!</p>
                        </header>
                        <main className="container mx-auto px-6 max-w-5xl py-16 space-y-12">
                            <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-stone-100">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="p-3 bg-stone-100 rounded-2xl text-aegean"><Icon name="plane" /></div>
                                    <h2 className="text-3xl font-normal">Flying to the Sporades</h2>
                                </div>
                                <p className="text-stone-600 leading-relaxed mb-4">The easiest way to reach Skopelos is flying to <strong>Skiathos (JSI)</strong>. Direct flights from London take approximately 3.5 hours.</p>
                                <p className="text-stone-600 leading-relaxed">Alternatively, fly to <strong>Athens</strong> and take a internal flight to Skiathos or a longer ferry from the mainland.</p>
                            </div>
                            <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-stone-100">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="p-3 bg-stone-100 rounded-2xl text-aegean"><Icon name="ship" /></div>
                                    <h2 className="text-3xl font-normal">Ferry Connections</h2>
                                </div>
                                <p className="text-stone-600 leading-relaxed mb-4">From Skiathos, it's a short 30-60 minute ferry ride to Skopelos (Port of Loutraki or Skopelos Town). We recommend booking via <strong>Ferryhopper</strong>.</p>
                            </div>
                        </main>
                        <Footer />
                    </div>
                );
            }

            // Tips Page
            if (currentPage === 'tips') {
                return (
                    <div className="min-h-screen bg-stone-50 text-stone-800">
                        <NavigationMenu />
                        <RSVPModal isOpen={isRSVPOpen} onClose={() => setIsRSVPOpen(false)} />
                        <header className="pt-32 pb-16 bg-aegean text-white text-center px-6">
                            <h1 className="text-5xl md:text-6xl mb-6">Skopelos Tips</h1>
                            <p className="max-w-xl mx-auto opacity-90 italic">A few essentials for your stay in the Sporades</p>
                        </header>
                        <main className="container mx-auto px-6 max-w-5xl py-16">
                            <div className="grid md:grid-cols-2 gap-8">
                                {[
                                    { title: "Cash & Cards", icon: "credit-card", text: "While most restaurants in Skopelos Town accept cards, smaller tavernas and local shops often prefer cash (Euros). It's handy to keep some on you for beach beds and taxis." },
                                    { title: "Car Rental", icon: "car", text: "The island is surprisingly mountainous. We highly recommend renting a small car or quad bike to explore the hidden coves. Book in advance for May!" },
                                    { title: "Island Time", icon: "clock", text: "Embrace the slow pace. Shops often close between 2pm and 5pm for siesta, reopening late into the evening." },
                                    { title: "Tap Water", icon: "droplets", text: "The tap water is safe for showering but not recommended for drinking. Bottled water is cheap and widely available at every 'Periptero' (kiosk)." }
                                ].map((tip, i) => (
                                    <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-stone-100 hover:shadow-md transition-shadow">
                                        <div className="w-12 h-12 bg-stone-50 rounded-xl flex items-center justify-center mb-6 text-aegean">
                                            <Icon name={tip.icon} size={24} />
                                        </div>
                                        <h3 className="text-2xl mb-4 font-normal">{tip.title}</h3>
                                        <p className="text-stone-500 text-sm leading-relaxed">{tip.text}</p>
                                    </div>
                                ))}
                            </div>
                        </main>
                        <Footer />
                    </div>
                );
            }

            // Home Page
            return (
                <div className="fade-in bg-stone-50">
                    <NavigationMenu />
                    <RSVPModal isOpen={isRSVPOpen} onClose={() => setIsRSVPOpen(false)} />
                    
                    <header className="relative h-screen flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-black/30 z-10"></div>
                            <img src="Cape-Amarandos-Skopelos-Greece.jpg" className="w-full h-full object-cover" alt="Cape Amarandos" />
                        </div>
                        <div className="relative z-20 text-center text-white px-6">
                            <p className="text-xs uppercase tracking-[0.4em] mb-6 font-bold">Skopelos, Greece</p>
                            <h1 className="text-6xl md:text-9xl mb-8 leading-none">Samantha <br/> <span className="italic opacity-80 text-4xl md:text-7xl">&</span> <br/> Barnaby</h1>
                            <p className="text-xl md:text-2xl italic">26 . 05 . 2026</p>
                        </div>
                    </header>

                    <section className="py-24 px-6 container mx-auto max-w-5xl">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-5xl mb-4 font-normal">The Celebration</h2>
                            <p className="text-stone-500 italic">May 25th — May 27th</p>
                        </div>
                        
                        <div className="flex justify-center space-x-4 mb-12">
                            {['25', '26', '27'].map(d => (
                                <button key={d} onClick={() => setActiveTab(d)} className={`flex flex-col items-center px-8 py-4 rounded-2xl transition-all ${activeTab === d ? 'bg-stone-800 text-white shadow-xl' : 'bg-white text-stone-400 border border-stone-100'}`}>
                                    <span className="text-[10px] uppercase tracking-widest mb-1">{d === '25' ? 'Mon' : d === '26' ? 'Tue' : 'Wed'}</span>
                                    <span className="text-xl font-bold">{d}</span>
                                </button>
                            ))}
                        </div>

                        <div className="bg-white rounded-[2.5rem] p-8 md:p-16 shadow-sm border border-stone-100 min-h-[400px]">
                            {activeTab === '26' ? (
                                <div className="fade-in space-y-12">
                                    <div className="text-center max-w-xl mx-auto border-b border-stone-100 pb-12">
                                        <h3 className="text-3xl mb-2 font-normal">The Wedding Day</h3>
                                        <p className="text-aegean font-bold text-xs uppercase tracking-[0.2em]">Tuesday 26th May</p>
                                    </div>
                                    <div className="grid gap-8 max-w-2xl mx-auto">
                                        {[
                                            { t: "12:00", e: "Welcome Drinks", d: "Refreshing Greek spritz on the terrace" },
                                            { t: "13:00", e: "Ceremony", d: "Under the pine trees overlooking the Aegean" },
                                            { t: "15:00", e: "Wedding Breakfast", d: "A feast of local Skopelos delicacies" },
                                            { t: "18:15", e: "The Party", d: "Dancing until the early hours" }
                                        ].map((item, i) => (
                                            <div key={i} className="flex gap-8 group">
                                                <span className="font-bold text-stone-300 w-16 text-sm pt-1 tracking-tighter">{item.t}</span>
                                                <div className="pb-8 border-l border-stone-100 pl-8 relative">
                                                    <div className="absolute -left-[5px] top-2 w-2 h-2 rounded-full bg-stone-200 group-hover:bg-aegean transition-colors"></div>
                                                    <p className="font-bold text-xl mb-1">{item.e}</p>
                                                    <p className="text-stone-400 text-sm italic leading-relaxed">{item.d}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="flex items-center justify-center h-[300px] text-stone-400 italic">
                                    <p>Details for this day will be shared soon.</p>
                                </div>
                            )}
                        </div>
                    </section>

                    <section className="py-24 bg-stone-100/50">
                        <div className="container mx-auto px-6 max-w-5xl">
                            <div className="bg-white rounded-[3rem] p-8 md:p-20 shadow-sm border border-stone-100">
                                <div className="text-center mb-16">
                                    <div className="w-16 h-16 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <Icon name="palette" className="text-stone-800" />
                                    </div>
                                    <h2 className="text-[10px] uppercase tracking-[0.4em] font-bold text-stone-400 mb-4">The Dress Code</h2>
                                    <h3 className="text-4xl md:text-5xl font-normal text-stone-800 mb-8">“Aegean Summer”</h3>
                                    <p className="text-stone-500 italic max-w-2xl mx-auto leading-relaxed">
                                        We would love for the day to feel light, airy, and effortlessly elegant—mirroring the vibrant spirit of a Greek summer. We invite you to embrace a palette of sun-drenched pastels, bold Mediterranean solids, and flowing, sophisticated fabrics.
                                    </p>
                                </div>

                                <div className="grid md:grid-cols-2 gap-12 md:gap-24">
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4 border-b border-stone-100 pb-4">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-[#00b4b4]">For Gentlemen</span>
                                            <div className="h-px flex-1 bg-stone-100"></div>
                                        </div>
                                        <h4 className="text-2xl font-normal text-stone-800">Summer Tailoring</h4>
                                        <div className="space-y-4 text-stone-500 text-sm leading-relaxed">
                                            <p><strong className="text-stone-800 uppercase text-[10px] tracking-widest block mb-1">The Look</strong> Fitted linen or cotton suits in light, breathable tones (think sand, stone, sage, or pale blue).</p>
                                            <p><strong className="text-stone-800 uppercase text-[10px] tracking-widest block mb-1">The Detail</strong> While ties are optional, we encourage a sharp, tailored finish. A crisp shirt and pocket square will perfectly complement the setting.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4 border-b border-stone-100 pb-4">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-[#00b4b4]">For Ladies</span>
                                            <div className="h-px flex-1 bg-stone-100"></div>
                                        </div>
                                        <h4 className="text-2xl font-normal text-stone-800">Architectural Silhouettes</h4>
                                        <div className="space-y-4 text-stone-500 text-sm leading-relaxed">
                                            <p><strong className="text-stone-800 uppercase text-[10px] tracking-widest block mb-1">The Look</strong> We’d love to see a sea of soft, tonal shades or vibrant colours. Think of dresses with beautiful draping, clean lines, or a subtle shimmer.</p>
                                            <p><strong className="text-stone-800 uppercase text-[10px] tracking-widest block mb-1">The Detail</strong> Think elegant fabrics that catch the island breeze over more casual linen florals. The sea and sunshine are the inspiration.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
