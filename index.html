<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & B | Skopelos 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/century-gothic');
        body { font-family: 'Century Gothic', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bg-aegean { background-color: #00b4b4; }
        .text-aegean { color: #00b4b4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- EMAILJS CONFIGURATION ---
        const EMAILJS_PUBLIC_KEY = "x68dU85ltXbBTJyQT"; 
        const EMAILJS_SERVICE_ID = "sammy.and.barney.85";
        const EMAILJS_TEMPLATE_ID = "template_a5h60pd";

        // Initialize EmailJS
        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const RSVPModal = ({ isOpen, onClose }) => {
            const [status, setStatus] = useState('idle'); 
            const [formData, setFormData] = useState({
                names: '',
                attending: '',
                dietary: '',
                song: ''
            });
            
            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('sending');

                const templateParams = {
                    from_name: formData.names,
                    attendance: formData.attending === 'yes' ? 'Happily Attending' : 'Regretfully Declining',
                    dietary: formData.dietary || 'None specified',
                    song_request: formData.song || 'No request'
                };

                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                    setStatus('success');
                } catch (error) {
                    console.error("EmailJS Error:", error);
                    setStatus('error');
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden shadow-2xl fade-in max-h-[90vh] flex flex-col">
                        <div className="p-8 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                            <div>
                                <h2 className="text-2xl font-normal text-stone-800">RSVP</h2>
                                <p className="text-[10px] uppercase tracking-widest text-stone-400 mt-1 font-bold italic">Kindly respond by 31st March 2026</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-stone-200 rounded-full transition-colors">
                                <Icon name="x" size={20} className="text-stone-400" />
                            </button>
                        </div>
                        
                        <div className="p-8 overflow-y-auto no-scrollbar">
                            {status === 'success' ? (
                                <div className="text-center py-12 space-y-6">
                                    <div className="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto">
                                        <Icon name="check" size={40} />
                                    </div>
                                    <div className="px-4">
                                        <h3 className="text-2xl mb-2">Thank You!</h3>
                                        <p className="text-stone-500 text-sm">Your response has been sent to Sammy & Barney.</p>
                                    </div>
                                    <button onClick={onClose} className="bg-stone-800 text-white px-8 py-3 rounded-full text-xs uppercase tracking-widest font-bold">
                                        Back to site
                                    </button>
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    {status === 'error' && (
                                        <div className="p-4 bg-red-50 text-red-600 rounded-xl text-sm">
                                            Something went wrong. Please try again or contact us directly.
                                        </div>
                                    )}
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Full Names</label>
                                            <input required type="text" value={formData.names} onChange={(e) => setFormData({...formData, names: e.target.value})} placeholder="e.g. John & Jane Smith" className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-aegean transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Attendance</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <label className={`flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-colors ${formData.attending === 'yes' ? 'border-aegean bg-aegean/5 text-aegean' : 'border-stone-200 text-stone-500 hover:bg-stone-50'}`}>
                                                    <input required type="radio" name="attending" value="yes" onChange={(e) => setFormData({...formData, attending: e.target.value})} className="hidden" />
                                                    <span className="text-sm">Happily Attend</span>
                                                </label>
                                                <label className={`flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-colors ${formData.attending === 'no' ? 'border-stone-800 bg-stone-50 text-stone-800' : 'border-stone-200 text-stone-500 hover:bg-stone-50'}`}>
                                                    <input required type="radio" name="attending" value="no" onChange={(e) => setFormData({...formData, attending: e.target.value})} className="hidden" />
                                                    <span className="text-sm">Regretfully Decline</span>
                                                </label>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Dietary Requirements</label>
                                            <textarea rows="2" value={formData.dietary} onChange={(e) => setFormData({...formData, dietary: e.target.value})} placeholder="Allergies, vegetarian, etc..." className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-aegean transition-colors text-sm"></textarea>
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase tracking-widest font-bold text-stone-400 block mb-2">Song Request</label>
                                            <input type="text" value={formData.song} onChange={(e) => setFormData({...formData, song: e.target.value})} placeholder="The song that gets you dancing" className="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-aegean transition-colors text-sm" />
                                        </div>
                                    </div>
                                    <button type="submit" disabled={status === 'sending'} className="w-full bg-aegean text-white py-4 rounded-full text-xs uppercase tracking-widest font-bold hover:bg-opacity-90 transition-all shadow-lg shadow-aegean/20 disabled:opacity-50">
                                        {status === 'sending' ? 'Sending...' : 'Send Response'}
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('26');
            const [scrolled, setScrolled] = useState(false);
            const [isRSVPOpen, setIsRSVPOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const NavigationMenu = () => (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled || currentPage !== 'home' ? 'bg-white/95 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <button onClick={() => setCurrentPage('home')} className={`text-2xl tracking-tighter transition-colors ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>
                            S & B
                        </button>
                        <div className={`hidden lg:flex space-x-6 text-[10px] uppercase tracking-widest font-bold ${scrolled || currentPage !== 'home' ? 'text-stone-800' : 'text-white'}`}>
                            <button onClick={() => setCurrentPage('home')} className="hover:opacity-60 transition-opacity">The Wedding</button>
                            <button onClick={() => setCurrentPage('travel')} className="hover:opacity-60 transition-opacity">Travel Guide</button>
                            <button onClick={() => setCurrentPage('guide')} className="hover:opacity-60 transition-opacity">Skopelos Tips</button>
                        </div>
                        <button onClick={() => setIsRSVPOpen(true)} className={`px-6 py-2 rounded-full text-xs uppercase tracking-widest transition-all font-bold ${scrolled || currentPage !== 'home' ? 'bg-stone-800 text-white' : 'bg-white text-aegean'}`}>
                            RSVP
                        </button>
                    </div>
                </nav>
            );

            const TabButton = ({ id, label, date }) => (
                <button onClick={() => setActiveTab(id)} className={`flex flex-col items-center px-6 py-4 rounded-xl transition-all duration-300 ${activeTab === id ? 'bg-stone-800 text-white shadow-lg transform -translate-y-1' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>
                    <span className="text-[10px] font-mono uppercase tracking-widest mb-1">{label}</span>
                    <span className="text-xl font-bold">{date}</span>
                </button>
            );

            if (currentPage === 'travel') {
                return (
                    <div className="min-h-screen bg-stone-50 text-stone-800">
                        <NavigationMenu />
                        <RSVPModal isOpen={isRSVPOpen} onClose={() => setIsRSVPOpen(false)} />
                        <header className="pt-32 pb-16 bg-stone-800 text-white text-center px-6">
                            <h1 className="text-5xl md:text-6xl mb-6">Travel Guide</h1>
                            <p className="text-stone-400 italic">Getting to the island</p>
                        </header>
                        <main className="container mx-auto px-6 max-w-5xl py-16">
                            <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-stone-100">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="p-3 bg-stone-100 rounded-2xl"><Icon name="plane" /></div>
                                    <h2 className="text-3xl">Flying to the Sporades</h2>
                                </div>
                                <p className="text-stone-600 leading-relaxed mb-8">The easiest way to reach Skopelos is flying to <strong>Skiathos (JSI)</strong> and taking a short ferry.</p>
                                <button onClick={() => setCurrentPage('home')} className="text-stone-400 hover:text-stone-800 flex items-center gap-2 font-bold uppercase tracking-widest text-xs">
                                    <Icon name="chevron-left" size={16} /> Back
                                </button>
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className="fade-in">
                    <NavigationMenu />
                    <RSVPModal isOpen={isRSVPOpen} onClose={() => setIsRSVPOpen(false)} />
                    <header className="relative h-screen flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-black/40 z-10"></div>
                            <img src="Cape-Amarandos-Skopelos-Greece.jpg" className="w-full h-full object-cover" alt="Cape Amarandos" />
                        </div>
                        <div className="relative z-20 text-center text-white px-6">
                            <p className="text-xs uppercase tracking-[0.4em] mb-6 font-bold">Skopelos, Greece</p>
                            <h1 className="text-6xl md:text-9xl mb-8 leading-none">Samantha <br/> <span className="italic opacity-80 text-4xl md:text-7xl">&</span> <br/> Barnaby</h1>
                            <p className="text-xl md:text-2xl italic">26 . 05 . 2026</p>
                        </div>
                    </header>

                    <section className="py-24 px-6 container mx-auto max-w-5xl">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-5xl mb-4">The Celebration</h2>
                            <p className="text-stone-500 italic">May 25th — May 27th</p>
                        </div>
                        <div className="flex justify-center space-x-4 mb-12">
                            <TabButton id="25" label="Monday" date="25" />
                            <TabButton id="26" label="Tuesday" date="26" />
                            <TabButton id="27" label="Wednesday" date="27" />
                        </div>
                        <div className="bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-stone-100 min-h-[300px]">
                            {activeTab === '26' ? (
                                <div className="fade-in space-y-6">
                                    <h3 className="text-3xl mb-6">The Wedding Day</h3>
                                    <div className="flex gap-4"><span className="font-bold text-stone-300">12:00</span><p>Welcome Drinks</p></div>
                                    <div className="flex gap-4"><span className="font-bold text-stone-300">13:00</span><p>Ceremony</p></div>
                                    <div className="flex gap-4"><span className="font-bold text-stone-300">15:00</span><p>Wedding Breakfast</p></div>
                                    <div className="flex gap-4"><span className="font-bold text-stone-300">18:15</span><p>The Party</p></div>
                                </div>
                            ) : (
                                <p className="text-stone-400 italic">Details for this day are being finalized.</p>
                            )}
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
